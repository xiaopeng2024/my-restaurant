<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>江西小炒 · 数字化云端管理</title>
    <script src="https://cdn.staticfile.org/tailwind-css/2.2.19/tailwind.min.js"></script>
    <script src="https://web-99.cdn.cloudbase.net/sdk/2.8.0/cloudbase.full.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .dish-done { text-decoration: line-through; opacity: 0.3; filter: grayscale(1); }
        .category-active { background-color: #dc2626; color: white; transform: scale(1.05); }
        @keyframes pulse { 0%, 100% { border-color: #dc2626; } 50% { border-color: transparent; } }
        .urgent-border { border: 3px solid #dc2626; animation: pulse 1s infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen select-none">

    <header class="bg-red-600 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🏮</span>
            <h1 class="text-lg font-black italic tracking-tighter">江西小炒 PRO</h1>
        </div>
        <div class="flex bg-black/20 rounded-full p-1 text-[10px] font-bold">
            <button onclick="switchView('user')" id="nav-user" class="px-5 py-1.5 rounded-full bg-white text-red-600">点餐端</button>
            <button onclick="switchView('admin')" id="nav-admin" class="px-5 py-1.5 rounded-full text-white/70">后厨端</button>
        </div>
    </header>

    <main id="main" class="flex-1 pb-32 overflow-y-auto"></main>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 bg-gray-900 text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center hidden z-40">
        <div>
            <p id="cart-info" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">确认桌号</p>
            <p id="cart-price" class="text-2xl font-black text-red-500 italic">¥ 0</p>
        </div>
        <button onclick="submitOrder()" id="submit-btn" class="bg-red-600 px-10 py-3 rounded-2xl font-black text-sm active:scale-95 transition-all">确认下单</button>
    </div>

    <script>
        // --- 1. 腾讯云开发初始化 (已注入您的凭证) ---
        const envId = "my-jxxc-6g4w7jse94653bcc";
        const app = cloudbase.init({
            env: envId
        });
        
        // 使用匿名登录模式（适合扫码即点）
        const auth = app.auth();
        async function login() {
            if (!auth.hasLoginState()) {
                await auth.anonymousAuthProvider().signIn();
            }
        }
        login();

        const db = app.database();
        const _ = db.command;

        // --- 2. 业务配置 ---
        const MENU = {
            "爆炒荤菜": [{ id: 1, name: '辣椒炒肉', price: 28, icon: '🌶️' }, { id: 2, name: '小炒牛肉', price: 45, icon: '🥩' }, { id: 3, name: '酸萝卜肥肠', price: 38, icon: '🥘' }],
            "清爽蔬菜": [{ id: 5, name: '手撕包菜', price: 16, icon: '🥬' }, { id: 6, name: '临川菜梗', price: 18, icon: '🌿' }],
            "特色主食": [{ id: 10, name: '南昌拌粉', price: 12, icon: '🍜' }, { id: 11, name: '瓦罐煨汤', price: 15, icon: '🥣' }, { id: 12, name: '白米饭', price: 2, icon: '🍚', isRice: true }]
        };
        const TABLES = ["1号", "2号", "3号", "5号", "6号", "7号", "大包厢", "打包1", "打包2"];

        let state = {
            view: 'user',
            table: '',
            cart: [],
            category: '爆炒荤菜',
            orders: [],
            history: []
        };

        // --- 3. 核心交互 ---
        async function refreshData() {
            try {
                // 拉取进行中的订单
                const res = await db.collection('orders').orderBy('time', 'desc').get();
                state.orders = res.data;
                
                // 如果是财务页，拉取流水
                if (state.view === 'finance') {
                    const hisRes = await db.collection('history').orderBy('time', 'desc').limit(50).get();
                    state.history = hisRes.data;
                }
                render();
            } catch (e) { console.error("数据同步失败", e); }
        }

        function speak(text) {
            if (window.speechSynthesis) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'zh-CN';
                window.speechSynthesis.speak(msg);
            }
        }

        function switchView(v) {
            state.view = v;
            document.getElementById('nav-user').className = v === 'user' ? "px-5 py-1.5 rounded-full bg-white text-red-600 shadow-sm" : "px-5 py-1.5 rounded-full text-white/70";
            document.getElementById('nav-admin').className = (v === 'admin' || v === 'finance') ? "px-5 py-1.5 rounded-full bg-white text-red-600 shadow-sm" : "px-5 py-1.5 rounded-full text-white/70";
            refreshData();
        }

        // --- 4. 渲染逻辑 ---
        function render() {
            const container = document.getElementById('main');
            const cartBar = document.getElementById('cart-bar');

            if (state.view === 'user') {
                cartBar.style.display = state.cart.length > 0 ? 'flex' : 'none';
                renderUser(container);
            } else if (state.view === 'admin') {
                cartBar.style.display = 'none';
                renderAdmin(container);
            } else {
                cartBar.style.display = 'none';
                renderFinance(container);
            }
        }

        function renderUser(container) {
            const packing = state.table.includes('打包') ? state.cart.filter(i => !i.isRice).length : 0;
            const subtotal = state.cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-info').innerText = state.table ? `${state.table} (打包费¥${packing})` : '请先选桌号';
            document.getElementById('cart-price').innerText = `¥ ${subtotal + packing}`;

            container.innerHTML = `
                <div class="p-4 space-y-5">
                    <div class="bg-white p-4 rounded-3xl shadow-sm flex gap-2 overflow-x-auto no-scrollbar">
                        ${TABLES.map(t => `<button onclick="state.table='${t}';render()" class="px-5 py-2.5 rounded-xl text-xs font-black border flex-shrink-0 transition-all ${state.table === t ? 'bg-red-600 border-red-600 text-white' : 'bg-gray-50 border-transparent text-gray-400'}">${t}</button>`).join('')}
                    </div>
                    <div class="flex gap-4">
                        <div class="w-16 space-y-2">
                            ${Object.keys(MENU).map(c => `<button onclick="state.category='${c}';render()" class="w-full py-5 rounded-2xl text-[10px] font-black leading-tight ${state.category === c ? 'bg-red-600 text-white shadow-lg' : 'text-gray-400'}">${c}</button>`).join('')}
                        </div>
                        <div class="flex-1 grid gap-2">
                            ${MENU[state.category].map(i => `
                                <div onclick="addToCart(${i.id})" class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm active:scale-95 transition-all">
                                    <div class="flex items-center gap-3">
                                        <span class="text-2xl">${i.icon}</span>
                                        <div><p class="font-black text-sm text-gray-800">${i.name}</p><p class="text-red-600 font-black text-xs italic">¥${i.price}</p></div>
                                    </div>
                                    <div class="bg-gray-100 w-8 h-8 rounded-full flex items-center justify-center font-black text-gray-400">+</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="mt-10">
                        <h3 class="text-[10px] font-black text-gray-400 px-2 mb-3 tracking-widest uppercase">我的订单进度</h3>
                        ${state.orders.filter(o => o.table === state.table && state.table).map(o => `
                            <div class="bg-white p-6 rounded-[2rem] border border-gray-100 mb-3 shadow-sm">
                                <div class="flex justify-between mb-4">
                                    <span class="text-[10px] font-black ${o.status==='pending'?'text-orange-500':'text-green-600'}">${o.status==='pending'?'厨师待接单...':'主厨爆炒中🔥'}</span>
                                    <span class="text-lg font-black text-red-600 italic">¥${o.total}</span>
                                </div>
                                <div class="space-y-3">
                                    ${o.items.map((it, idx) => `
                                        <div class="flex justify-between items-center text-xs">
                                            <span class="font-bold ${it.done?'dish-done text-gray-300':''} ${it.refunding?'text-red-400':''}">${it.name}</span>
                                            ${(!it.done && !it.refunding) ? `<button onclick="applyRefund('${o._id}', ${idx})" class="text-[10px] text-gray-300 underline font-bold">退菜</button>`:''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderAdmin(container) {
            container.innerHTML = `
                <div class="p-4 space-y-4">
                    <div class="flex gap-2 mb-2">
                        <button onclick="switchView('admin')" class="flex-1 py-4 rounded-2xl bg-gray-900 text-white font-black text-xs shadow-lg">制作看板</button>
                        <button onclick="switchView('finance')" class="flex-1 py-4 rounded-2xl bg-white text-gray-400 border border-gray-100 font-black text-xs">流水对账</button>
                    </div>
                    ${state.orders.map(o => `
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm relative ${o.status==='pending'?'urgent-border':''}">
                            <div class="flex justify-between items-center mb-5">
                                <span class="bg-black text-white px-5 py-1.5 rounded-xl font-black text-xs">${o.table}</span>
                                <span class="text-xl font-black text-red-600 italic">¥${o.total}</span>
                            </div>
                            <div class="space-y-2 mb-6">
                                ${o.items.map((it, idx) => `
                                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl">
                                        <span onclick="toggleDone('${o._id}', ${idx})" class="text-sm font-black ${it.done?'dish-done':''} cursor-pointer flex-1">${it.name}</span>
                                        ${it.refunding ? `
                                            <div class="flex gap-2">
                                                <button onclick="doRefund('${o._id}', ${idx}, true)" class="bg-red-600 text-white px-4 py-1.5 rounded-xl text-[10px] font-black">同意退菜</button>
                                                <button onclick="doRefund('${o._id}', ${idx}, false)" class="bg-gray-200 text-gray-400 px-4 py-1.5 rounded-xl text-[10px] font-black">拒绝</button>
                                            </div>
                                        ` : `<button onclick="adminDelete('${o._id}', ${idx})" class="text-gray-300 px-2">🗑️</button>`}
                                    </div>
                                `).join('')}
                            </div>
                            ${o.status==='pending' ? 
                                `<button onclick="startCooking('${o._id}')" class="w-full bg-red-600 text-white py-5 rounded-[1.5rem] font-black shadow-xl shadow-red-100">接单并准备制作</button>` :
                                `<button onclick="finishOrder('${o._id}')" class="w-full bg-gray-900 text-white py-5 rounded-[1.5rem] font-black">已上齐 · 结账存档</button>`
                            }
                        </div>
                    `).join('')}
                    ${state.orders.length === 0 ? '<div class="py-20 text-center text-gray-300 font-black">当前无待处理订单</div>' : ''}
                </div>
            `;
        }

        function renderFinance(container) {
            const today = new Date().toLocaleDateString();
            const dayRev = state.history.filter(h => new Date(h.time).toLocaleDateString() === today).reduce((s,o)=>s+o.total, 0);
            container.innerHTML = `
                <div class="p-4 space-y-5">
                    <button onclick="switchView('admin')" class="text-xs font-black text-gray-400 flex items-center gap-1">← 返回看板</button>
                    <div class="bg-gray-900 p-8 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                        <div class="absolute -top-10 -right-10 w-40 h-40 bg-red-600 rounded-full blur-3xl opacity-20"></div>
                        <p class="text-[10px] opacity-40 font-black uppercase tracking-widest mb-1 relative z-10">今日流水额</p>
                        <h2 class="text-5xl font-black italic text-red-500 tracking-tighter relative z-10">¥${dayRev.toFixed(2)}</h2>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-[10px] font-black text-gray-400 px-2 tracking-widest uppercase">最近账单明细</h3>
                        ${state.history.map(h => `
                            <div class="bg-white p-5 rounded-2xl flex justify-between items-center shadow-sm">
                                <div><p class="text-xs font-black">${h.table}</p><p class="text-[9px] text-gray-300 font-bold">${new Date(h.time).toLocaleString()}</p></div>
                                <span class="text-red-600 font-black text-sm italic">¥${h.total}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- 5. 业务逻辑实现 ---
        function addToCart(id) {
            for(let c in MENU) {
                const f = MENU[c].find(i=>i.id===id);
                if(f) { state.cart.push({...f}); break; }
            }
            render();
        }

        async function submitOrder() {
            if(!state.table) return alert("请先选择桌号");
            const packing = state.table.includes('打包') ? state.cart.filter(i => !i.isRice).length : 0;
            const subtotal = state.cart.reduce((s, i) => s + i.price, 0);
            
            await db.collection('orders').add({
                table: state.table,
                items: state.cart.map(i => ({...i, done: false, refunding: false})),
                total: subtotal + packing,
                status: 'pending',
                time: Date.now()
            });
            state.cart = [];
            speak(`新订单提醒，${state.table}号桌点餐。`);
            refreshData();
        }

        async function startCooking(id) {
            await db.collection('orders').doc(id).update({ status: 'cooking' });
            speak(`${state.orders.find(o=>o._id===id).table}开始制作`);
            refreshData();
        }

        async function toggleDone(oid, idx) {
            const o = state.orders.find(ord => ord._id === oid);
            o.items[idx].done = !o.items[idx].done;
            await db.collection('orders').doc(oid).update({ items: o.items });
            render();
        }

        async function applyRefund(oid, idx) {
            const o = state.orders.find(ord => ord._id === oid);
            o.items[idx].refunding = true;
            await db.collection('orders').doc(oid).update({ items: o.items });
            speak(`退菜申请，${o.table}请求退回${o.items[idx].name}`);
            refreshData();
            alert("退菜申请已发送，请等待后厨确认");
        }

        async function doRefund(oid, idx, agree) {
            const o = state.orders.find(ord => ord._id === oid);
            if(agree) {
                o.items.splice(idx, 1);
                if(o.items.length === 0) {
                    await db.collection('orders').doc(oid).remove();
                } else {
                    const packing = o.table.includes('打包') ? o.items.filter(i => !i.isRice).length : 0;
                    const total = o.items.reduce((s,i)=>s+i.price, 0) + packing;
                    await db.collection('orders').doc(oid).update({ items: o.items, total: total });
                }
                speak("退菜已同意");
            } else {
                o.items[idx].refunding = false;
                await db.collection('orders').doc(oid).update({ items: o.items });
                speak("退菜已拒绝");
            }
            refreshData();
        }

        async function adminDelete(oid, idx) {
            if(confirm("确定删除该菜品？")) doRefund(oid, idx, true);
        }

        async function finishOrder(oid) {
            const o = state.orders.find(ord => ord._id === oid);
            await db.collection('history').add({
                table: o.table,
                total: o.total,
                time: Date.now()
            });
            await db.collection('orders').doc(oid).remove();
            speak(`结账成功，收米啦！`);
            refreshData();
        }

        // 定时拉取云端最新状态 (每5秒)
        setInterval(refreshData, 5000);
        switchView('user');
    </script>
</body>
</html>
