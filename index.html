<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>江西小炒 · 智慧餐饮管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f4f6f9; }
        .tab-active { background-color: #dc2626 !important; color: white !important; border-color: #dc2626 !important; }
        .category-btn.active { background-color: #dc2626; color: white; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .done-line { text-decoration: line-through; opacity: 0.4; }
        @keyframes notify-pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .pulse-red { animation: notify-pulse 1.5s infinite; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="app" class="min-h-screen flex flex-col">
        <!-- 导航头 -->
        <header class="bg-red-600 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🔥</span>
                <h1 class="text-lg font-black tracking-tighter">江西小炒 · 智慧厨房</h1>
            </div>
            <div class="flex bg-black/20 rounded-full p-1 border border-white/10 text-[10px]">
                <button onclick="setView('user')" id="nav-user" class="px-4 py-1.5 rounded-full bg-white text-red-600 font-bold">点餐端</button>
                <button onclick="checkAdmin()" id="nav-admin" class="px-4 py-1.5 rounded-full text-white/70 font-bold">后厨端</button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main id="main-content" class="flex-1 overflow-y-auto pb-32"></main>

        <!-- 客户端悬浮车 -->
        <div id="cart-float" class="fixed bottom-6 left-4 right-4 max-w-lg mx-auto bg-gray-900 text-white p-4 rounded-[2rem] shadow-2xl flex justify-between items-center hidden z-40">
            <div class="pl-2">
                <p id="cart-table-tag" class="text-[9px] text-gray-500 font-black uppercase tracking-widest">请选桌号</p>
                <p id="cart-price-tag" class="text-xl font-black text-red-500 italic">¥ 0</p>
            </div>
            <button onclick="doSubmit()" id="submit-btn" class="bg-red-600 px-8 py-3 rounded-xl font-black text-sm active:scale-90 transition-all">确认下单</button>
        </div>
    </div>

    <!-- 弹窗组件 -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm overflow-hidden" id="modal-body"></div>
    </div>

    <script>
        // --- 基础配置 ---
        const firebaseConfig = { apiKey: "", authDomain: "my-jx-xiaochao.firebaseapp.com", projectId: "my-jx-xiaochao" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const ADMIN_PWD = "888888";

        const MENU_DATA = {
            "特色招牌区": [{ id: 101, name: '瓦罐煨汤', price: 15, icon: '🥣' }, { id: 102, name: '井冈山豆皮', price: 26, icon: '🥘' }, { id: 103, name: '南昌拌粉', price: 12, icon: '🍜' }],
            "荤菜区": [{ id: 1, name: '辣椒炒肉', price: 28, icon: '🌶️' }, { id: 3, name: '小炒黄牛肉', price: 42, icon: '🥩' }],
            "蔬菜区": [{ id: 5, name: '临川菜梗', price: 18, icon: '🌿' }, { id: 6, name: '手撕包菜', price: 16, icon: '🥬' }],
            "干锅区": [{ id: 8, name: '干锅肥肠', price: 45, icon: '🍲' }],
            "饮料区": [{ id: 11, name: '王老吉', price: 5, icon: '🥤' }],
            "酒水区": [{ id: 14, name: '青岛啤酒', price: 8, icon: '🍺' }],
            "米饭区": [{ id: 16, name: '白米饭', price: 2, icon: '🍚', isRice: true }]
        };

        const TABLES = {
            "堂食": ["1", "2", "3", "4", "5", "6", "7", "中1号", "中2号", "666小包", "888大包"],
            "打包": ["打包1", "打包2", "打包3", "打包4"],
            "排队": ["排队1", "排队2"]
        };

        let state = {
            view: 'user', // user | admin | finance
            table: '',
            cart: [],
            orders: [],
            activeCategory: '特色招牌区',
            financeTab: 'day' // day | month | year | history
        };

        // --- 核心逻辑 ---

        function setView(v) {
            state.view = v;
            document.getElementById('nav-user').className = v === 'user' ? "px-4 py-1.5 rounded-full bg-white text-red-600 font-bold" : "px-4 py-1.5 rounded-full text-white/70 font-bold";
            document.getElementById('nav-admin').className = (v === 'admin' || v === 'finance') ? "px-4 py-1.5 rounded-full bg-white text-red-600 font-bold" : "px-4 py-1.5 rounded-full text-white/70 font-bold";
            render();
        }

        function checkAdmin() {
            if(state.view === 'admin' || state.view === 'finance') return;
            const p = prompt("进入后厨端需输入密码:");
            if(p === ADMIN_PWD) setView('admin');
            else if(p !== null) alert("密码错误！");
        }

        function setTable(t) { state.table = t; render(); }
        function setCategory(c) { state.activeCategory = c; render(); }

        function calculatePacking(table, items) {
            if (!table.startsWith('打包')) return 0;
            return items.filter(i => !i.isRice).reduce((s, i) => s + i.count, 0);
        }

        // --- 渲染引擎 ---

        function render() {
            const container = document.getElementById('main-content');
            const cartFloat = document.getElementById('cart-float');

            if (state.view === 'user') {
                cartFloat.style.display = state.cart.length > 0 ? 'flex' : 'none';
                renderUser(container);
            } else if (state.view === 'admin') {
                cartFloat.style.display = 'none';
                renderAdmin(container);
            } else if (state.view === 'finance') {
                renderFinance(container);
            }
        }

        function renderUser(container) {
            const currentTotal = state.cart.reduce((s, i) => s + i.price * i.count, 0) + calculatePacking(state.table, state.cart);
            document.getElementById('cart-table-tag').innerText = state.table ? `${state.table} 号桌` : '请选桌号';
            document.getElementById('cart-price-tag').innerText = `¥ ${currentTotal}`;

            container.innerHTML = `
                <div class="p-4 space-y-4">
                    <!-- 桌号选择 -->
                    <div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
                        <p class="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">座次安排</p>
                        <div class="flex flex-wrap gap-2">
                            ${Object.values(TABLES).flat().map(t => `
                                <button onclick="setTable('${t}')" class="px-3 py-2 rounded-xl text-[10px] font-black border transition-all ${state.table === t ? 'bg-red-600 border-red-600 text-white' : 'bg-gray-50 border-transparent text-gray-400'}">${t}</button>
                            `).join('')}
                        </div>
                    </div>

                    <!-- 分类与菜品 -->
                    <div class="flex gap-4">
                        <div class="w-20 space-y-2 flex-shrink-0">
                            ${Object.keys(MENU_DATA).map(c => `
                                <button onclick="setCategory('${c}')" class="w-full py-3 rounded-xl text-[10px] font-black transition-all ${state.activeCategory === c ? 'bg-red-600 text-white' : 'text-gray-400'}">${c.replace('区','')}</button>
                            `).join('')}
                        </div>
                        <div class="flex-1 grid gap-2">
                            ${MENU_DATA[state.activeCategory].map(i => {
                                const count = state.cart.filter(c => c.id === i.id).reduce((s,c)=>s+c.count, 0);
                                return `
                                    <div class="bg-white p-3 rounded-2xl flex items-center justify-between shadow-sm">
                                        <div class="flex items-center gap-3">
                                            <span class="text-2xl">${i.icon}</span>
                                            <div><p class="text-xs font-black text-gray-800">${i.name}</p><p class="text-red-500 font-black text-xs italic">¥${i.price}</p></div>
                                        </div>
                                        <button onclick="addToCart(${i.id}, '${state.activeCategory}')" class="bg-red-600 text-white w-8 h-8 rounded-full font-black text-lg">+</button>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <!-- 我的订单 -->
                    <div class="mt-8 space-y-3">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-2">点单进度</h3>
                        ${state.orders.filter(o => o.table === state.table && state.table).map(o => `
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                                <div class="flex justify-between mb-3">
                                    <span class="text-[10px] font-black ${o.status==='pending'?'text-orange-500':'text-green-600'}">${o.status==='pending'?'待接单':'火热制作中'}</span>
                                    <span class="font-black text-red-600 italic">¥${o.finalTotal}</span>
                                </div>
                                <div class="space-y-2">
                                    ${o.items.map((i, idx) => `
                                        <div class="flex justify-between items-center text-xs">
                                            <span class="font-bold ${i.isDone?'done-line':''} ${i.refundPending?'text-orange-400':''}">${i.name} x${i.count} ${i.refundPending?'(退菜中)':''}</span>
                                            ${(!i.isDone && !i.refundPending) ? `<button onclick="applyRefund('${o.id}', ${idx})" class="text-[9px] text-gray-300 font-bold underline">退菜</button>`:''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderAdmin(container) {
            container.innerHTML = `
                <div class="p-4 space-y-6">
                    <div class="flex gap-2">
                        <button onclick="setView('admin')" class="flex-1 bg-gray-900 text-white py-4 rounded-2xl font-black shadow-lg">厨房传菜</button>
                        <button onclick="setView('finance')" class="flex-1 bg-white text-gray-900 py-4 rounded-2xl font-black shadow-sm">财务报表</button>
                    </div>

                    <div class="grid gap-4">
                        ${state.orders.map(o => `
                            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm relative border-2 ${o.status==='pending'?'border-red-500 pulse-red':'border-transparent'}">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="bg-black text-white px-4 py-1 rounded-xl font-black text-sm">${o.table}</span>
                                    <span class="text-lg font-black text-red-600">¥${o.finalTotal}</span>
                                </div>
                                <div class="space-y-3 mb-6">
                                    ${o.items.map((i, idx) => `
                                        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                                            <div onclick="toggleItemDone('${o.id}', ${idx})" class="flex-1 cursor-pointer">
                                                <p class="text-sm font-black ${i.isDone?'done-line':''}">${i.name} x${i.count}</p>
                                                <p class="text-[9px] text-gray-400 font-bold">${i.spicy} ${i.note||''}</p>
                                            </div>
                                            <div class="flex items-center gap-3">
                                                ${i.refundPending ? `
                                                    <button onclick="handleRefund('${o.id}', ${idx}, true)" class="text-[10px] bg-red-600 text-white px-3 py-1 rounded-lg font-bold">同意退菜</button>
                                                    <button onclick="handleRefund('${o.id}', ${idx}, false)" class="text-[10px] bg-gray-200 text-gray-500 px-3 py-1 rounded-lg font-bold">拒绝</button>
                                                ` : `
                                                    <button onclick="removeItem('${o.id}', ${idx})" class="text-gray-300">🗑️</button>
                                                `}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="flex gap-2">
                                    ${o.status==='pending' ? `
                                        <button onclick="updateStatus('${o.id}', 'cooking')" class="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black">接单</button>
                                    ` : `
                                        <button onclick="finishOrder('${o.id}')" class="flex-1 bg-gray-900 text-white py-4 rounded-2xl font-black">全部上齐 · 结账并存档</button>
                                    `}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderFinance(container) {
            const today = new Date().toLocaleDateString();
            // 注意：这里仅展示已结账存档的数据。实际应从archive集合读取。这里为演示从orders当前状态模拟历史。
            const total = state.orders.reduce((s,o)=>s+o.finalTotal,0);

            container.innerHTML = `
                <div class="p-4 space-y-4">
                    <button onclick="setView('admin')" class="text-xs font-black text-gray-400 flex items-center gap-1">← 返回厨房</button>
                    <div class="bg-gray-900 p-8 rounded-[3rem] text-white shadow-2xl">
                        <p class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] mb-1">Total Revenue</p>
                        <h2 class="text-5xl font-black italic text-red-500 tracking-tighter">¥${total.toFixed(2)}</h2>
                        <div class="mt-6 flex bg-white/5 p-1 rounded-xl text-[10px] font-black">
                            <button class="flex-1 py-2 rounded-lg bg-white text-black">今日</button>
                            <button class="flex-1 py-2 text-white/40">本月</button>
                            <button class="flex-1 py-2 text-white/40">本年</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-xs font-black text-gray-400 px-2">流水明细</h3>
                        ${state.orders.map(o => `
                            <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                                <div><p class="text-xs font-black">${o.table}</p><p class="text-[9px] text-gray-300">${new Date(o.createdAt?.seconds*1000).toLocaleString()}</p></div>
                                <p class="text-sm font-black text-red-600">+ ¥${o.finalTotal}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- 业务操作 ---

        function addToCart(id, cat) {
            const item = MENU_DATA[cat].find(m => m.id == id);
            state.cart.push({...item, count: 1, spicy: '中辣', isDone: false});
            render();
        }

        async function doSubmit() {
            if(!state.table) return alert("请选桌号");
            const btn = document.getElementById('submit-btn');
            const { total, packingFee } = calculateCart();
            btn.disabled = true;
            try {
                await db.collection('orders').add({
                    table: state.table,
                    items: state.cart,
                    finalTotal: total,
                    packingFee: packingFee,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                state.cart = [];
                alert("下单成功！");
                render();
            } catch(e) { alert("失败"); }
            finally { btn.disabled = false; }
        }

        function calculateCart() {
            const total = state.cart.reduce((s, i) => s + i.price * i.count, 0);
            const packingFee = calculatePacking(state.table, state.cart);
            return { total: total + packingFee, packingFee };
        }

        // --- 菜品状态与退菜控制 ---

        async function toggleItemDone(orderId, itemIdx) {
            const order = state.orders.find(o => o.id === orderId);
            order.items[itemIdx].isDone = !order.items[itemIdx].isDone;
            await db.collection('orders').doc(orderId).update({ items: order.items });
        }

        async function removeItem(orderId, itemIdx) {
            const order = state.orders.find(o => o.id === orderId);
            order.items.splice(itemIdx, 1);
            if(order.items.length === 0) {
                await db.collection('orders').doc(orderId).delete();
            } else {
                // 重新计算总额（含打包费）
                const packing = calculatePacking(order.table, order.items);
                const subTotal = order.items.reduce((s,i)=>s+i.price*i.count,0);
                await db.collection('orders').doc(orderId).update({ 
                    items: order.items, 
                    finalTotal: subTotal + packing,
                    packingFee: packing
                });
            }
        }

        async function applyRefund(orderId, itemIdx) {
            const order = state.orders.find(o => o.id === orderId);
            order.items[itemIdx].refundPending = true;
            await db.collection('orders').doc(orderId).update({ items: order.items });
            alert("已提交退菜申请，请等待后厨确认。");
        }

        async function handleRefund(orderId, itemIdx, approved) {
            const order = state.orders.find(o => o.id === orderId);
            if (approved) {
                order.items.splice(itemIdx, 1);
                if(order.items.length === 0) {
                    await db.collection('orders').doc(orderId).delete();
                } else {
                    const packing = calculatePacking(order.table, order.items);
                    const subTotal = order.items.reduce((s,i)=>s+i.price*i.count,0);
                    await db.collection('orders').doc(orderId).update({ 
                        items: order.items, 
                        finalTotal: subTotal + packing,
                        packingFee: packing
                    });
                }
                speak(`已确认桌号 ${order.table} 的退菜请求`);
            } else {
                delete order.items[itemIdx].refundPending;
                await db.collection('orders').doc(orderId).update({ items: order.items });
                speak(`已拒绝退菜请求`);
            }
        }

        async function updateStatus(id, s) { 
            await db.collection('orders').doc(id).update({ status: s });
        }

        async function finishOrder(id) {
            if(confirm("确定已收钱结账？此操作将存档并清理本桌。")) {
                await db.collection('orders').doc(id).delete();
            }
        }

        // --- 语音与监听 ---

        function speak(t) {
            if('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(t);
                u.lang = 'zh-CN';
                window.speechSynthesis.speak(u);
            }
        }

        db.collection('orders').onSnapshot(snap => {
            const list = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
                .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            
            if (state.view === 'admin') {
                const newPending = list.filter(o => o.status === 'pending').length;
                if (newPending > state.lastUnconfirmed) {
                    const last = list.find(o => o.status === 'pending');
                    speak(`新单提醒：${last.table}点餐了`);
                }
                
                // 检查是否有新的退菜申请
                list.forEach(o => {
                    if (o.items.some(i => i.refundPending)) {
                        const oldOrder = state.orders.find(old => old.id === o.id);
                        const oldRefunds = oldOrder ? oldOrder.items.filter(i => i.refundPending).length : 0;
                        const newRefunds = o.items.filter(i => i.refundPending).length;
                        if(newRefunds > oldRefunds) speak(`退菜警告：${o.table}请求退菜`);
                    }
                });
            }

            state.lastUnconfirmed = list.filter(o => o.status === 'pending').length;
            state.orders = list;
            render();
        });

        render();
    </script>
</body>
</html>
