<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>江西小炒 · 云点单</title>
    <!-- 引入样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Firebase 兼容库 (使用更稳定的 8.x 版本) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .cart-float { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #111; color: white; padding: 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 100; }
        .tab-btn { padding: 8px 16px; border-radius: 12px; font-weight: bold; font-size: 14px; border: 2px solid #f3f4f6; }
        .tab-btn.active { background: #ef4444; color: white; border-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- 顶部导航 -->
    <div class="bg-red-600 text-white p-4 sticky top-0 flex justify-between items-center z-50 shadow-md">
        <h1 class="font-bold text-lg">江西小炒</h1>
        <div class="flex gap-2">
            <button onclick="switchView('user')" id="btn-user" class="text-xs bg-white/20 px-3 py-1 rounded-full border border-white/30">扫码点餐</button>
            <button onclick="switchView('admin')" id="btn-admin" class="text-xs bg-white/20 px-3 py-1 rounded-full border border-white/30">后厨端</button>
        </div>
    </div>

    <!-- 内容区 -->
    <div id="main-content" class="p-4 pb-32">
        <!-- 这里由 JS 动态生成内容 -->
        <div id="loading" class="text-center py-20 text-gray-400">系统初始化中...</div>
    </div>

    <!-- 购物车栏 (默认隐藏) -->
    <div id="cart-bar" class="cart-float hidden animate-bounce">
        <div>
            <p id="cart-info" class="text-xs opacity-60">未选桌号</p>
            <p id="cart-total" class="text-xl font-black">¥ 0</p>
        </div>
        <button onclick="submitOrder()" id="submit-btn" class="bg-red-600 px-8 py-3 rounded-xl font-black active:scale-95 transition-transform">下单</button>
    </div>

    <script>
        // --- 1. 你的配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCE1wcz-K1DrryDwP1vjuucK3D7GTc_V_I",
            authDomain: "my-jx-xiaochao.firebaseapp.com",
            projectId: "my-jx-xiaochao",
            storageBucket: "my-jx-xiaochao.firebasestorage.app",
            messagingSenderId: "588016316112",
            appId: "1:588016316112:web:8dc9a6d451b29d5e4638d5"
        };

        // --- 2. 初始化 ---
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            console.log("Firebase 链接成功");
        } catch (e) {
            document.getElementById('loading').innerHTML = `<div class="text-red-500 font-bold p-4 bg-red-50 rounded">配置错误: ${e.message}</div>`;
        }

        const MENU = [
            { id: 1, name: '辣椒炒肉', price: 28, icon: '🌶️' },
            { id: 2, name: '临川菜梗', price: 18, icon: '🌿' },
            { id: 3, name: '余干辣椒炒肉', price: 32, icon: '🔥' },
            { id: 4, name: '手撕包菜', price: 16, icon: '🥬' },
            { id: 5, name: '小炒黄牛肉', price: 42, icon: '🥩' },
            { id: 6, name: '酸萝卜大肠', price: 38, icon: '🥘' }
        ];

        let state = {
            view: 'user',
            selectedTable: '',
            cart: [], // {id, count}
            orders: []
        };

        // --- 3. 逻辑处理 ---
        function render() {
            const container = document.getElementById('main-content');
            if (state.view === 'user') {
                renderUserView(container);
            } else {
                renderAdminView(container);
            }
            updateCartBar();
        }

        function renderUserView(container) {
            let html = `
                <div class="mb-6 bg-white p-4 rounded-2xl shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-widest">请选择桌号</p>
                    <div class="grid grid-cols-4 gap-2">
                        ${['1', '2', '3', '4', '5', '6', '7', '8'].map(t => `
                            <button onclick="selectTable('${t}')" class="tab-btn ${state.selectedTable === t ? 'active' : ''}">${t}号</button>
                        `).join('')}
                    </div>
                </div>
                <div class="space-y-3">
                    ${MENU.map(item => {
                        const cartItem = state.cart.find(c => c.id === item.id);
                        const count = cartItem ? cartItem.count : 0;
                        return `
                            <div class="bg-white p-4 rounded-2xl flex items-center shadow-sm border border-gray-100">
                                <span class="text-3xl mr-4">${item.icon}</span>
                                <div class="flex-1 font-bold">
                                    <p class="text-gray-800">${item.name}</p>
                                    <p class="text-red-600 font-black">¥ ${item.price}</p>
                                </div>
                                <div class="flex items-center gap-3">
                                    ${count > 0 ? `<button onclick="updateCart(${item.id}, -1)" class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 font-bold">-</button>` : ''}
                                    ${count > 0 ? `<span class="font-bold">${count}</span>` : ''}
                                    <button onclick="updateCart(${item.id}, 1)" class="w-8 h-8 rounded-full bg-red-600 text-white font-bold shadow-md">+</button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            container.innerHTML = html;
        }

        function renderAdminView(container) {
            const pendingOrders = state.orders.filter(o => o.status === 'pending');
            let html = `
                <div class="bg-orange-500 p-6 rounded-3xl text-white mb-6 shadow-lg shadow-orange-100">
                    <h2 class="text-xl font-black mb-4 flex items-center gap-2">👨‍🍳 厨房待做 (${pendingOrders.length})</h2>
                    <div class="space-y-2">
                        ${pendingOrders.length === 0 ? '<p class="opacity-70 italic">暂无新订单</p>' : ''}
                        ${state.orders.filter(o => o.status === 'pending').map(o => `
                            <div class="bg-white/20 p-3 rounded-xl flex justify-between items-center border border-white/10">
                                <div>
                                    <span class="bg-white text-orange-600 px-2 py-0.5 rounded text-[10px] font-bold mr-2">${o.table}号</span>
                                    <span class="font-bold">${o.items.map(i => `${i.name}x${i.count}`).join(', ')}</span>
                                </div>
                                <button onclick="finishOrder('${o.id}')" class="bg-white text-orange-600 px-3 py-1 rounded-lg text-xs font-black">完成</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="space-y-3">
                    <p class="text-[10px] font-bold text-gray-400 px-2 uppercase tracking-widest">历史订单</p>
                    ${state.orders.map(o => `
                        <div class="p-4 rounded-2xl bg-white border border-gray-100 ${o.status === 'done' ? 'opacity-40 grayscale' : ''}">
                            <div class="flex justify-between mb-2">
                                <span class="font-black text-red-600">${o.table}号桌</span>
                                <span class="text-[10px] text-gray-400">${new Date(o.createdAt?.seconds * 1000).toLocaleTimeString()}</span>
                            </div>
                            ${o.items.map(i => `<div class="flex justify-between text-sm font-bold"><span>${i.name}</span><span>x${i.count}</span></div>`).join('')}
                        </div>
                    `).join('')}
                </div>
            `;
            container.innerHTML = html;
        }

        // --- 4. 交互函数 ---
        window.switchView = (v) => { state.view = v; render(); };
        window.selectTable = (t) => { state.selectedTable = t; render(); };
        window.updateCart = (id, delta) => {
            const idx = state.cart.findIndex(c => c.id === id);
            if (idx > -1) {
                state.cart[idx].count += delta;
                if (state.cart[idx].count <= 0) state.cart.splice(idx, 1);
            } else if (delta > 0) {
                const item = MENU.find(m => m.id === id);
                state.cart.push({ ...item, count: 1 });
            }
            render();
        };

        function updateCartBar() {
            const bar = document.getElementById('cart-bar');
            if (state.cart.length > 0 && state.view === 'user') {
                bar.classList.remove('hidden');
                const total = state.cart.reduce((s, i) => s + (i.price * i.count), 0);
                document.getElementById('cart-total').innerText = `¥ ${total}`;
                document.getElementById('cart-info').innerText = state.selectedTable ? `${state.selectedTable}号桌 已点` : '请点选桌号';
            } else {
                bar.classList.add('hidden');
            }
        }

        window.submitOrder = async () => {
            if (!state.selectedTable) return alert("请先选桌号！");
            const btn = document.getElementById('submit-btn');
            btn.innerText = "提交中...";
            btn.disabled = true;

            try {
                await db.collection('orders').add({
                    table: state.selectedTable,
                    items: state.cart,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                state.cart = [];
                state.selectedTable = '';
                alert("下单成功！后厨已收到。");
                render();
            } catch (e) {
                alert("提交失败: " + e.message);
            } finally {
                btn.innerText = "下单";
                btn.disabled = false;
            }
        };

        window.finishOrder = (id) => {
            db.collection('orders').doc(id).update({ status: 'done' });
        };

        // --- 5. 数据监听 ---
        db.collection('orders').onSnapshot(snap => {
            state.orders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            render();
        });

    </script>
</body>
</html>
