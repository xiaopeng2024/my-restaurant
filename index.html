<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>江西小炒 · 智能点餐系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { -webkit-tap-highlight-color: transparent; }
        .active-tab { transform: scale(0.95); background-color: #dc2626 !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 1. 你的核心配置 (已核对) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCE1wcz-K1DrryDwP1vjuucK3D7GTc_V_I",
            authDomain: "my-jx-xiaochao.firebaseapp.com",
            projectId: "my-jx-xiaochao",
            storageBucket: "my-jx-xiaochao.firebasestorage.app",
            messagingSenderId: "588016316112",
            appId: "1:588016316112:web:8dc9a6d451b29d5e4638d5"
        };

        // --- 2. 初始化与报错检测 ---
        let db;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
        } catch (err) {
            alert("Firebase 初始化失败，请检查网络或配置！" + err.message);
        }

        const MENU = [
            { id: 1, name: '辣椒炒肉', price: 28, icon: '🌶️' },
            { id: 2, name: '临川菜梗', price: 18, icon: '🌿' },
            { id: 3, name: '余干辣椒炒肉', price: 32, icon: '🔥' },
            { id: 4, name: '手撕包菜', price: 16, icon: '🥬' },
            { id: 5, name: '小炒黄牛肉', price: 42, icon: '🥩' },
            { id: 6, name: '酸萝卜大肠', price: 38, icon: '🥘' }
        ];

        function App() {
            const [view, setView] = useState('user'); 
            const [table, setTable] = useState('');
            const [cart, setCart] = useState([]);
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(false);

            // 监听数据库
            useEffect(() => {
                const unsubscribe = db.collection('orders')
                    .onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setOrders(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    }, err => {
                        console.error("数据库读取失败:", err);
                    });
                return () => unsubscribe();
            }, []);

            // 提交订单逻辑
            const submitOrder = async () => {
                if (!table) return alert('请先点选桌号！');
                if (cart.length === 0) return alert('还没点菜呢！');
                
                setLoading(true);
                try {
                    await db.collection('orders').add({
                        table: table,
                        items: cart,
                        status: 'pending',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setCart([]);
                    setTable('');
                    alert('✅ 下单成功！后厨已收到消息');
                } catch (err) {
                    console.error(err);
                    alert('❌ 下单失败！原因：' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            // 后厨统计逻辑
            const summary = useMemo(() => {
                const res = {};
                orders.filter(o => o.status === 'pending').forEach(o => {
                    o.items.forEach(i => {
                        if (!res[i.name]) res[i.name] = { count: 0, tables: [] };
                        res[i.name].count += i.count;
                        if (!res[i.name].tables.includes(o.table)) res[i.name].tables.push(o.table);
                    });
                });
                return Object.entries(res);
            }, [orders]);

            const finishOrder = (id) => db.collection('orders').doc(id).update({ status: 'done' });
            const deleteOrder = (id) => db.collection('orders').doc(id).delete();

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 font-sans">
                    {/* 导航栏 */}
                    <header className="bg-red-600 p-4 text-white flex justify-between items-center sticky top-0 z-10 shadow-md">
                        <span className="font-black text-xl italic">JX XIAOCHAO</span>
                        <button onClick={() => setView(view === 'user' ? 'admin' : 'user')} className="text-xs border border-white/50 px-3 py-1 rounded-full">
                            {view === 'user' ? '切换后台' : '回到前餐'}
                        </button>
                    </header>

                    {view === 'user' ? (
                        <div className="p-4 space-y-4 pb-24">
                            {/* 桌号 */}
                            <div className="bg-white p-4 rounded-2xl shadow-sm">
                                <p className="text-[10px] font-bold text-gray-400 mb-2 uppercase">选择桌号</p>
                                <div className="grid grid-cols-4 gap-2">
                                    {['1', '2', '3', '4', '5', '中1', '666', '888'].map(t => (
                                        <button key={t} onClick={() => setTable(t)} className={`py-2 rounded-xl text-sm font-bold border transition-all ${table === t ? 'bg-red-600 text-white border-red-600' : 'bg-white border-gray-100 text-gray-600'}`}>
                                            {t}号
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* 菜单 */}
                            <div className="grid gap-3">
                                {MENU.map(item => {
                                    const num = cart.find(c => c.id === item.id)?.count || 0;
                                    return (
                                        <div key={item.id} className="bg-white p-4 rounded-2xl flex items-center shadow-sm border border-gray-50">
                                            <span className="text-3xl mr-4">{item.icon}</span>
                                            <div className="flex-1 font-bold">
                                                <p className="text-gray-800">{item.name}</p>
                                                <p className="text-red-600">¥{item.price}</p>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                {num > 0 && <button onClick={() => setCart(cart.map(c => c.id === item.id ? {...c, count: c.count-1} : c).filter(c => c.count > 0))} className="w-8 h-8 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center">-</button>}
                                                {num > 0 && <span className="font-bold">{num}</span>}
                                                <button onClick={() => {
                                                    const exist = cart.find(c => c.id === item.id);
                                                    if(exist) setCart(cart.map(c => c.id === item.id ? {...c, count: c.count+1} : c));
                                                    else setCart([...cart, {...item, count: 1}]);
                                                }} className="w-8 h-8 rounded-full bg-red-600 text-white flex items-center justify-center font-bold">+</button>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>

                            {/* 底部结算 */}
                            {cart.length > 0 && (
                                <div className="fixed bottom-4 inset-x-4 max-w-md mx-auto bg-gray-900 text-white p-4 rounded-3xl flex justify-between items-center shadow-2xl animate-bounce-short">
                                    <div className="pl-2">
                                        <p className="text-xl font-black">¥{cart.reduce((s,i)=>s+i.price*i.count,0)}</p>
                                        <p className="text-[10px] opacity-50">{table || '未选桌号'}</p>
                                    </div>
                                    <button onClick={submitOrder} disabled={loading} className="bg-red-600 px-8 py-3 rounded-2xl font-black">
                                        {loading ? '发送中...' : '提交订单'}
                                    </button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="p-4 space-y-4">
                            <div className="bg-orange-500 p-6 rounded-3xl text-white shadow-lg">
                                <h2 className="text-xl font-black mb-4">👨‍🍳 后厨待做汇总</h2>
                                <div className="space-y-3">
                                    {summary.length === 0 ? <p className="opacity-70 italic">暂时没活，休息一下</p> : 
                                    summary.map(([name, data]) => (
                                        <div key={name} className="bg-white/20 p-3 rounded-xl flex justify-between items-center">
                                            <div>
                                                <p className="font-bold text-lg">{name}</p>
                                                <p className="text-[10px] opacity-70">桌号: {data.tables.join(', ')}</p>
                                            </div>
                                            <span className="text-3xl font-black">x{data.count}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-3">
                                <p className="text-[10px] font-bold text-gray-400 px-2 uppercase">实时流水线</p>
                                {orders.map(o => (
                                    <div key={o.id} className={`p-4 rounded-2xl border-2 transition-all ${o.status === 'done' ? 'bg-gray-100 border-transparent grayscale opacity-50' : 'bg-white border-red-50 shadow-sm'}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="font-black bg-red-600 text-white px-3 py-1 rounded-lg">{o.table}号桌</span>
                                            <div className="flex gap-2">
                                                {o.status === 'pending' ? 
                                                    <button onClick={() => finishOrder(o.id)} className="text-xs bg-green-500 text-white px-3 py-1 rounded-lg font-bold">完成</button> :
                                                    <button onClick={() => deleteOrder(o.id)} className="text-xs bg-gray-200 text-gray-500 px-3 py-1 rounded-lg font-bold">删除</button>
                                                }
                                            </div>
                                        </div>
                                        {o.items.map((i,idx) => <div key={idx} className="flex justify-between text-sm font-bold text-gray-600"><span>{i.name}</span><span>x{i.count}</span></div>)}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
