<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>江西小炒 · 云端管理</title>
    <!-- 仅引用核心 SDK -->
    <script src="https://web-99.cdn.cloudbase.net/sdk/2.8.0/cloudbase.full.js"></script>
    <style>
        /* 使用最基础的 CSS，确保任何手机都能显示红色 */
        body { margin: 0; padding: 0; background-color: #f0f2f5; font-family: sans-serif; }
        .header { background-color: #e63946; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-nav { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
        .tab-item { flex: 1; text-align: center; padding: 12px; font-size: 14px; color: #666; border-bottom: 2px solid transparent; }
        .tab-item.active { color: #e63946; border-bottom: 2px solid #e63946; font-weight: bold; }
        
        .container { padding: 10px; margin-bottom: 80px; }
        .table-select { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; }
        .table-box { background: white; padding: 8px 15px; border-radius: 5px; border: 1px solid #ddd; font-size: 13px; white-space: nowrap; }
        .table-box.active { background: #e63946; color: white; border-color: #e63946; }
        
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .dish-name { font-size: 16px; font-weight: bold; color: #333; }
        .dish-price { color: #e63946; font-size: 14px; margin-top: 5px; }
        .add-btn { background: #e63946; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 20px; }
        
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .order-btn { background: #e63946; color: white; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; }
        
        .order-list-item { background: white; margin-top: 10px; padding: 15px; border-radius: 8px; border-left: 5px solid #e63946; }
        .status-tag { font-size: 11px; background: #eee; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="header">🏮 江西小炒数字化系统</div>

<div class="tab-nav">
    <div id="tab-user" class="tab-item active" onclick="switchView('user')">客人点餐</div>
    <div id="tab-admin" class="tab-item" onclick="switchView('admin')">后厨接单</div>
</div>

<div id="main" class="container">
    <!-- 动态内容加载区 -->
    <div style="text-align:center; color:#999; padding:50px;">系统启动中...</div>
</div>

<div id="footer" class="footer-bar" style="display:none;">
    <div>
        <span id="footer-table" style="font-size:12px; color:#aaa;">未选桌</span><br>
        <span id="footer-total" style="font-size:18px; color:#e63946; font-weight:bold;">¥ 0</span>
    </div>
    <button class="order-btn" onclick="submitOrder()">立即下单</button>
</div>

<script>
    // 1. 初始化云开发 (请确认envId正确)
    const envId = "my-jxxc-6g4w7jse94653bcc";
    const app = cloudbase.init({ env: envId });
    const db = app.database();
    
    // 自动登录
    async function initAuth() {
        try {
            const auth = app.auth();
            if (!auth.hasLoginState()) await auth.anonymousAuthProvider().signIn();
            loadData();
        } catch(e) { alert("网络连接失败，请检查安全域名设置"); }
    }

    // 2. 基础数据
    const MENU = [
        {id:1, name:'辣椒炒肉', price:28},
        {id:2, name:'小炒牛肉', price:45},
        {id:3, name:'酸萝卜肥肠', price:38},
        {id:4, name:'手撕包菜', price:16},
        {id:5, name:'南昌拌粉', price:12},
        {id:6, name:'瓦罐煨汤', price:15}
    ];
    const TABLES = ["1号桌", "2号桌", "3号桌", "5号桌", "打包1", "打包2"];

    let state = {
        view: 'user',
        table: '',
        cart: [],
        orders: []
    };

    // 3. 核心逻辑
    function switchView(v) {
        state.view = v;
        document.getElementById('tab-user').className = v === 'user' ? 'tab-item active' : 'tab-item';
        document.getElementById('tab-admin').className = v === 'admin' ? 'tab-item active' : 'tab-item';
        render();
    }

    function addToCart(id) {
        const item = MENU.find(m => m.id === id);
        state.cart.push(item);
        render();
    }

    async function submitOrder() {
        if(!state.table) return alert("请先点击上方选择桌号");
        if(state.cart.length === 0) return alert("还没点菜呢");
        
        await db.collection('orders').add({
            table: state.table,
            items: state.cart,
            total: state.cart.reduce((s,i)=>s+i.price, 0),
            status: '待做',
            time: Date.now()
        });
        state.cart = [];
        alert("下单成功，后厨已收到！");
        loadData();
    }

    async function loadData() {
        const res = await db.collection('orders').orderBy('time', 'desc').get();
        state.orders = res.data;
        render();
    }

    async function deleteOrder(id) {
        if(confirm("确定结账或删除？")) {
            await db.collection('orders').doc(id).remove();
            loadData();
        }
    }

    // 4. 渲染界面
    function render() {
        const main = document.getElementById('main');
        const footer = document.getElementById('footer');

        if(state.view === 'user') {
            footer.style.display = state.cart.length > 0 ? 'flex' : 'none';
            document.getElementById('footer-table').innerText = state.table || '未选桌';
            document.getElementById('footer-total').innerText = '¥ ' + state.cart.reduce((s,i)=>s+i.price, 0);

            let html = '<div class="table-select">';
            TABLES.forEach(t => {
                html += `<div class="table-box ${state.table===t?'active':''}" onclick="state.table='${t}';render()">${t}</div>`;
            });
            html += '</div>';

            MENU.forEach(m => {
                html += `
                    <div class="card" onclick="addToCart(${m.id})">
                        <div>
                            <div class="dish-name">${m.name}</div>
                            <div class="dish-price">¥${m.price}</div>
                        </div>
                        <button class="add-btn">+</button>
                    </div>
                `;
            });

            // 展示当前桌正在做的菜
            const myOrders = state.orders.filter(o => o.table === state.table);
            if(myOrders.length > 0) {
                html += '<div style="margin-top:20px; color:#999; font-size:12px;">我的订单：</div>';
                myOrders.forEach(o => {
                    html += `
                        <div class="order-list-item">
                            <div style="display:flex;justify-content:space-between">
                                <b>${o.table}</b> <span class="status-tag">${o.status}</span>
                            </div>
                            <div style="font-size:13px; color:#666; margin-top:5px;">
                                ${o.items.map(it => it.name).join('，')}
                            </div>
                        </div>
                    `;
                });
            }
            main.innerHTML = html;

        } else {
            footer.style.display = 'none';
            let html = '<div style="font-size:12px; color:#999; margin-bottom:10px;">后厨待办事项：</div>';
            state.orders.forEach(o => {
                html += `
                    <div class="order-list-item" style="border-left-color:#333">
                        <div style="display:flex;justify-content:space-between; align-items:center;">
                            <b style="font-size:18px;">${o.table}</b>
                            <button onclick="deleteOrder('${o._id}')" style="background:#333; color:#fff; border:none; padding:5px 10px; border-radius:4px; font-size:12px;">已上菜/结账</button>
                        </div>
                        <div style="font-size:16px; font-weight:bold; color:#000; margin-top:10px;">
                            ${o.items.map(it => `· ${it.name}`).join('<br>')}
                        </div>
                        <div style="margin-top:10px; text-align:right; font-size:12px; color:#e63946;">总计：¥${o.total}</div>
                    </div>
                `;
            });
            if(state.orders.length === 0) html = '<div style="text-align:center; padding:50px; color:#ccc;">暂无新订单</div>';
            main.innerHTML = html;
        }
    }

    // 启动
    initAuth();
    // 每10秒自动刷新一次数据
    setInterval(loadData, 10000);
</script>

</body>
</html>
