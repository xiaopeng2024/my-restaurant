<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>江西小炒 · 诊断模式</title>
    <script src="https://web-99.cdn.cloudbase.net/sdk/2.8.0/cloudbase.full.js"></script>
    <style>
        body { margin: 0; background: #f4f4f4; font-family: sans-serif; }
        .header { background: #e63946; color: white; padding: 20px; text-align: center; font-size: 20px; font-weight: bold; }
        .status-box { background: #fff; margin: 10px; padding: 15px; border-radius: 8px; border-left: 5px solid #ff9800; font-size: 14px; }
        .menu-item { background: white; margin: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .add-btn { background: #e63946; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 20px; }
        .error-text { color: #e63946; font-weight: bold; background: #ffebeb; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="header">🏮 江西小炒管理系统</div>

<div id="status" class="status-box">
    <b>系统状态：</b> <span id="status-msg">正在连接腾讯云...</span>
    <div id="error-info" class="error-text"></div>
</div>

<div id="main-content">
    <!-- 菜单将在这里显示 -->
</div>

<script>
    // --- 【必须检查】这里一定要改成你自己的环境ID ---
    const envId = "my-jxxc-6g4w7jse94653bcc"; 
    
    const MENU = [
        {name: '辣椒炒肉', price: 28},
        {name: '小炒牛肉', price: 45},
        {name: '南昌拌粉', price: 12}
    ];

    async function initSystem() {
        const msg = document.getElementById('status-msg');
        const errInfo = document.getElementById('error-info');
        
        try {
            const app = cloudbase.init({ env: envId });
            const auth = app.auth();
            
            msg.innerText = "正在尝试匿名登录...";
            await auth.anonymousAuthProvider().signIn();
            
            msg.innerText = "✅ 已连接，正在读取菜单...";
            renderMenu();
            
        } catch (err) {
            msg.innerText = "❌ 连接失败";
            errInfo.style.display = "block";
            errInfo.innerHTML = `
                错误原因：${err.code || '未知'}<br>
                详细信息：${err.message}<br><br>
                💡 解决建议：<br>
                1. 检查腾讯云是否开启了“匿名登录”<br>
                2. 检查“Web安全域名”是否添加了当前网址
            `;
        }
    }

    function renderMenu() {
        const container = document.getElementById('main-content');
        let html = '<div style="padding:10px; font-weight:bold;">推荐菜品：</div>';
        
        MENU.forEach(item => {
            html += `
                <div class="menu-item">
                    <div>
                        <div style="font-weight:bold;">${item.name}</div>
                        <div style="color:#e63946; font-size:14px;">¥${item.price}</div>
                    </div>
                    <button class="add-btn">+</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // 页面加载完立即执行
    window.onload = initSystem;
</script>

</body>
</html>
